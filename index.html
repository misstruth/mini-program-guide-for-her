<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>小程序开发流程卡片</title>
  <style>
    :root {
      --bg: #f5efe6;
      --panel: rgba(255, 252, 247, 0.92);
      --panel-strong: #fffdf9;
      --ink: #2b241f;
      --muted: #786a5b;
      --line: rgba(74, 54, 33, 0.12);
      --brand: #e9805d;
      --brand-deep: #c95a34;
      --accent: #ffd9c9;
      --shadow: 0 24px 60px rgba(85, 49, 21, 0.12);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --phone-width: min(100%, 430px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 214, 194, 0.86), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(255, 245, 205, 0.92), transparent 24%),
        linear-gradient(180deg, #fbf6ef 0%, #f6ede2 42%, #efe4d5 100%);
    }

    .page {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 28px 14px 40px;
    }

    .phone-shell {
      width: var(--phone-width);
      border-radius: 34px;
      padding: 14px;
      background: rgba(61, 45, 28, 0.08);
      box-shadow: 0 18px 50px rgba(70, 44, 19, 0.18);
      backdrop-filter: blur(10px);
    }

    .phone-screen {
      min-height: calc(100vh - 80px);
      border-radius: 28px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.16)),
        linear-gradient(180deg, #fffaf3 0%, #fff5ea 55%, #fbf0e4 100%);
      position: relative;
    }

    .phone-screen::before,
    .phone-screen::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
    }

    .phone-screen::before {
      width: 180px;
      height: 180px;
      top: -70px;
      right: -60px;
      background: rgba(248, 163, 130, 0.22);
    }

    .phone-screen::after {
      width: 160px;
      height: 160px;
      bottom: 90px;
      left: -50px;
      background: rgba(255, 226, 165, 0.22);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px 10px;
      font-size: 13px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    .status-right {
      display: flex;
      gap: 8px;
      color: var(--muted);
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 8px 16px 28px;
    }

    .hero-card,
    .section-card,
    .footer-card,
    .loading-card {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero-card {
      border-radius: var(--radius-xl);
      padding: 22px 20px 20px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      right: -18px;
      top: 24px;
      width: 94px;
      height: 94px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(233, 128, 93, 0.18), rgba(255, 216, 184, 0.54));
      transform: rotate(12deg);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      color: var(--brand-deep);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .hero-title {
      margin-top: 16px;
      width: 82%;
      font-size: 29px;
      line-height: 1.18;
      letter-spacing: -0.03em;
    }

    .hero-subtitle {
      margin-top: 12px;
      width: 80%;
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
    }

    .chip-row {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent);
      color: #8e3f21;
      font-size: 12px;
      font-weight: 700;
    }

    .section-card {
      margin-top: 16px;
      border-radius: var(--radius-lg);
      padding: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
    }

    .section-note {
      font-size: 12px;
      color: var(--muted);
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .timeline-item {
      padding: 16px;
      border-radius: var(--radius-md);
      background: var(--panel-strong);
      border: 1px solid rgba(74, 54, 33, 0.08);
    }

    .timeline-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .phase-id {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #ffded1, #ffcdb8);
      color: #994527;
      font-weight: 800;
    }

    .phase-duration {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .phase-title {
      margin-top: 12px;
      font-size: 17px;
      font-weight: 800;
    }

    .phase-description {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.75;
      color: var(--muted);
    }

    .task-list,
    .check-items,
    .faq-list {
      display: grid;
      gap: 10px;
    }

    .task,
    .check-item,
    .tip-card,
    .faq-item {
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(74, 54, 33, 0.08);
    }

    .task {
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.6;
    }

    .check-grid,
    .tip-grid {
      display: grid;
      gap: 12px;
    }

    .check-card {
      padding: 16px;
      border-radius: var(--radius-md);
      background: var(--panel-strong);
      border: 1px solid rgba(74, 54, 33, 0.08);
    }

    .check-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .check-item {
      padding: 11px 13px;
      font-size: 13px;
      line-height: 1.55;
    }

    .tip-card {
      padding: 16px;
    }

    .tip-title {
      font-size: 15px;
      font-weight: 800;
    }

    .tip-content {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted);
    }

    .faq-item {
      padding: 16px;
    }

    .faq-question {
      font-size: 15px;
      font-weight: 800;
    }

    .faq-answer {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted);
    }

    .footer-card {
      margin-top: 16px;
      border-radius: 24px;
      padding: 20px;
      background:
        linear-gradient(135deg, rgba(255, 233, 219, 0.95), rgba(255, 249, 241, 0.92));
    }

    .footer-signature {
      font-size: 13px;
      color: var(--brand-deep);
      font-weight: 700;
    }

    .footer-message {
      margin-top: 10px;
      font-size: 15px;
      line-height: 1.8;
    }

    .loading-card {
      border-radius: 24px;
      padding: 22px 18px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }

    @media (min-width: 768px) {
      .phone-screen {
        min-height: auto;
      }

      .check-grid,
      .tip-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="phone-shell">
      <div class="phone-screen">
        <div class="status-bar">
          <span>09:41</span>
          <div class="status-right">
            <span>5G</span>
            <span>88%</span>
          </div>
        </div>
        <main class="content" id="app">
          <section class="loading-card">正在加载给她看的小程序开发流程...</section>
        </main>
      </div>
    </div>
  </div>

  <script>
    async function init() {
      const app = document.getElementById("app");

      try {
        const response = await fetch("/api/guide");
        if (!response.ok) {
          throw new Error("request failed");
        }

        const result = await response.json();
        render(result.data);
      } catch (error) {
        app.innerHTML = '<section class="loading-card">内容加载失败，请稍后刷新再试。</section>';
      }
    }

    function render(data) {
      const app = document.getElementById("app");

      app.innerHTML = `
        <section class="hero-card">
          <div class="eyebrow">${data.app.name}</div>
          <h1 class="hero-title">${data.hero.title}</h1>
          <p class="hero-subtitle">${data.hero.subtitle}</p>
          <div class="chip-row">
            ${data.hero.chips.map(chip => `<span class="chip">${chip}</span>`).join("")}
          </div>
        </section>

        <section class="section-card">
          <div class="section-head">
            <h2 class="section-title">开发时间线</h2>
            <span class="section-note">${data.app.audience}</span>
          </div>
          <div class="timeline">
            ${data.phases.map(phase => `
              <article class="timeline-item">
                <div class="timeline-top">
                  <span class="phase-id">${phase.id}</span>
                  <span class="phase-duration">${phase.duration}</span>
                </div>
                <h3 class="phase-title">${phase.title}</h3>
                <p class="phase-description">${phase.description}</p>
                <div class="task-list">
                  ${phase.tasks.map(task => `<div class="task">${task}</div>`).join("")}
                </div>
              </article>
            `).join("")}
          </div>
        </section>

        <section class="section-card">
          <div class="section-head">
            <h2 class="section-title">实用清单</h2>
            <span class="section-note">每次开发前对照一下</span>
          </div>
          <div class="check-grid">
            ${data.checklist.map(group => `
              <article class="check-card">
                <h3 class="check-title">${group.title}</h3>
                <div class="check-items">
                  ${group.items.map(item => `<div class="check-item">${item}</div>`).join("")}
                </div>
              </article>
            `).join("")}
          </div>
        </section>

        <section class="section-card">
          <div class="section-head">
            <h2 class="section-title">给她的三个提醒</h2>
            <span class="section-note">把开发这件事看简单一点</span>
          </div>
          <div class="tip-grid">
            ${data.tips.map(tip => `
              <article class="tip-card">
                <h3 class="tip-title">${tip.title}</h3>
                <p class="tip-content">${tip.content}</p>
              </article>
            `).join("")}
          </div>
        </section>

        <section class="section-card">
          <div class="section-head">
            <h2 class="section-title">常见问题</h2>
            <span class="section-note">先解决最常卡住的点</span>
          </div>
          <div class="faq-list">
            ${data.faq.map(item => `
              <article class="faq-item">
                <h3 class="faq-question">${item.question}</h3>
                <p class="faq-answer">${item.answer}</p>
              </article>
            `).join("")}
          </div>
        </section>

        <section class="footer-card">
          <div class="footer-signature">${data.footer.signature}</div>
          <p class="footer-message">${data.footer.message}</p>
        </section>
      `;
    }

    init();
  </script>
</body>

</html>
